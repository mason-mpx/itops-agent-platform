services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      # 添加构建参数，方便调试
      args:
        - NODE_ENV=production
    container_name: itops-backend
    # 使用 host 网络模式有时候更简单，但为了更好的隔离使用 bridge
    networks:
      - itops-network
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/app.db
      - JWT_SECRET=${JWT_SECRET}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - DOUBAO_API_BASE=${DOUBAO_API_BASE:-https://ark.cn-beijing.volces.com/api/v3}
      - DOUBAO_MODEL=${DOUBAO_MODEL:-doubao-4o}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:80,http://localhost:3000,http://localhost:8080,http://itops-frontend,http://frontend,http://localhost:5173}
    volumes:
      - app-data:/app/data
    # 资源限制，防止容器占用过多资源
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: itops-frontend
    networks:
      - itops-network
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

# 定义自定义网络
networks:
  itops-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 数据卷
volumes:
  app-data:
    driver: local
