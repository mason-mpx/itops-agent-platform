services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend.simple
    container_name: itops-backend-simple
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/app.db
      - JWT_SECRET=${JWT_SECRET:-your-production-secret-change-me}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:80,http://localhost:8080}
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: itops-frontend-simple
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  app-data:
